name: crpropa-testing_ubuntu24
on:
  push:
    paths:
      - ".github/workflows/testing_ubuntu24.yml"
      - "**.cpp"
      - "**.h"
      - "**.py"
      - "**.i"
      - "**/CMakeLists.txt"
      - "!plugin-template/**"
      - "!doc/**"
  pull_request:
    paths:
      - ".github/workflows/testing_ubuntu24.yml"
      - "**.cpp"
      - "**.h"
      - "**.py"
      - "**.i"
      - "**/CMakeLists.txt"
      - "!plugin-template/**"
      - "!doc/**"

jobs:
  x64:
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: "ubuntu-24"
            os: ubuntu-24.04
            swig_builtin: "On" 
            py: "/usr/bin/python3" 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Preinstall
        run: |
          sudo apt-get update
          sudo apt-get install libmuparser-dev python-dev-is-python3 libhdf5-serial-dev libomp5 libomp-dev libfftw3-dev libcfitsio-dev lcov
          pip install numpy
      - name: Set up the build
        run: |
          mkdir build
          cd build
          cmake .. -DENABLE_PYTHON=True -DENABLE_TESTING=On  -DENABLE_SWIG_BUILTIN=${{ matrix.config.swig_builtin }} -DSIMD_EXTENSIONS="none" 
      - name: Build CRPropa
        run: |
          cd build
          make
      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure --repeat until-pass:3
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "test-report_${{matrix.config.os}}"
          path: build/Testing/Temporary/LastTest.log
  arm:
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: "ubuntu-24"
            os: ubuntu-24.04-arm
            swig_builtin: "On" 
            py: "/usr/bin/python3" 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Preinstall
        run: |
          sudo apt-get update
          sudo apt-get install libmuparser-dev python-dev-is-python3 libhdf5-serial-dev libomp5 libomp-dev libfftw3-dev libcfitsio-dev lcov
          pip install numpy
          pip show numpy
      - name: Set up the build
        run: |
          mkdir build
          cd build
          cmake .. -DENABLE_PYTHON=True -DENABLE_TESTING=On  -DENABLE_SWIG_BUILTIN=${{ matrix.config.swig_builtin }} -DSIMD_EXTENSIONS="none" 
      - name: Build CRPropa
        run: |
          cd build
          make
      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure --repeat until-pass:3
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "test-report_${{matrix.config.os}}"
          path: build/Testing/Temporary/LastTest.log